<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#1a1206"/>
      <stop offset="55%" stop-color="#0d0a06"/>
      <stop offset="100%" stop-color="#070504"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(240,217,138,0.45)"/>
      <stop offset="60%" stop-color="rgba(201,162,39,0.10)"/>
      <stop offset="100%" stop-color="rgba(201,162,39,0)"/>
    </radialGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6e6a8"/>
      <stop offset="50%" stop-color="#c9a227"/>
      <stop offset="100%" stop-color="#7a5f18"/>
    </linearGradient>
    <linearGradient id="spoke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e9d38a"/>
      <stop offset="100%" stop-color="#8a6d1f"/>
    </linearGradient>
    <radialGradient id="gem" cx="38%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#fff6d8"/>
      <stop offset="35%" stop-color="#f0d98a"/>
      <stop offset="70%" stop-color="#c9a227"/>
      <stop offset="100%" stop-color="#6e5316"/>
    </radialGradient>
    <linearGradient id="ptr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff2c4"/>
      <stop offset="100%" stop-color="#c9a227"/>
    </linearGradient>
  </defs>

  <!-- square background so favicon corners look intentional -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="240" fill="url(#glow)"/>

  <!-- wheel disc -->
  <circle cx="256" cy="256" r="196" fill="#181109" stroke="#2a2010" stroke-width="4"/>
  <path d="M256 256 L180.99 74.92 A196 196 0 0 1 331.01 74.92 Z" fill="#20180d"/>
<path d="M256 256 L331.01 74.92 A196 196 0 0 1 437.08 180.99 Z" fill="#2c1f0f"/>
<path d="M256 256 L437.08 180.99 A196 196 0 0 1 437.08 331.01 Z" fill="#20180d"/>
<path d="M256 256 L437.08 331.01 A196 196 0 0 1 331.01 437.08 Z" fill="#2c1f0f"/>
<path d="M256 256 L331.01 437.08 A196 196 0 0 1 180.99 437.08 Z" fill="#20180d"/>
<path d="M256 256 L180.99 437.08 A196 196 0 0 1 74.92 331.01 Z" fill="#2c1f0f"/>
<path d="M256 256 L74.92 331.01 A196 196 0 0 1 74.92 180.99 Z" fill="#20180d"/>
<path d="M256 256 L74.92 180.99 A196 196 0 0 1 180.99 74.92 Z" fill="#2c1f0f"/>

  <line x1="256" y1="256" x2="183.29" y2="80.46" stroke="url(#spoke)" stroke-width="7" stroke-linecap="round"/>
<line x1="256" y1="256" x2="328.71" y2="80.46" stroke="url(#spoke)" stroke-width="7" stroke-linecap="round"/>
<line x1="256" y1="256" x2="431.54" y2="183.29" stroke="url(#spoke)" stroke-width="7" stroke-linecap="round"/>
<line x1="256" y1="256" x2="431.54" y2="328.71" stroke="url(#spoke)" stroke-width="7" stroke-linecap="round"/>
<line x1="256" y1="256" x2="328.71" y2="431.54" stroke="url(#spoke)" stroke-width="7" stroke-linecap="round"/>
<line x1="256" y1="256" x2="183.29" y2="431.54" stroke="url(#spoke)" stroke-width="7" stroke-linecap="round"/>
<line x1="256" y1="256" x2="80.46" y2="328.71" stroke="url(#spoke)" stroke-width="7" stroke-linecap="round"/>
<line x1="256" y1="256" x2="80.46" y2="183.29" stroke="url(#spoke)" stroke-width="7" stroke-linecap="round"/>


  <!-- outer rims -->
  <circle cx="256" cy="256" r="196" fill="none" stroke="url(#rim)" stroke-width="14"/>
  <circle cx="256" cy="256" r="183" fill="none" stroke="rgba(255,244,206,0.35)" stroke-width="2"/>
  <circle cx="256" cy="256" r="206" fill="none" stroke="#241a0c" stroke-width="6"/>

  <!-- top pointer -->
  <path d="M256 26 L292 92 L220 92 Z" fill="url(#ptr)" stroke="#241a0c" stroke-width="4" stroke-linejoin="round"/>

  <!-- center hub gem -->
  <circle cx="256" cy="256" r="70" fill="#241a0c"/>
  <circle cx="256" cy="256" r="60" fill="url(#gem)" stroke="#6e5316" stroke-width="3"/>
  <circle cx="242" cy="240" r="16" fill="rgba(255,255,255,0.55)"/>
</svg>